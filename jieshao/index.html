<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #020617;
      --accent: #3b82f6;
      --accent-soft: rgba(59,130,246,0.15);
      --border: rgba(148,163,184,0.25);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --danger: #f97373;
      --radius-lg: 18px;
      --radius-sm: 10px;
      --shadow-soft: 0 24px 80px rgba(15,23,42,0.85);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1d4ed8 0, transparent 55%),
                  radial-gradient(circle at bottom, #22c55e 0, transparent 55%),
                  linear-gradient(135deg, #020617, #020617 45%, #020617 100%);
      color: var(--text-main);
    }

    .login-shell {
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    .glow {
      position: absolute;
      inset: -1px;
      border-radius: 28px;
      background:
        linear-gradient(120deg, rgba(56,189,248,0.15), transparent 25%, transparent 75%, rgba(96,165,250,0.25)),
        radial-gradient(circle at top left, rgba(52,211,153,0.5), transparent 60%),
        radial-gradient(circle at bottom right, rgba(59,130,246,0.7), transparent 60%);
      filter: blur(18px);
      opacity: 0.9;
      z-index: -1;
    }

    .card {
      position: relative;
      border-radius: 24px;
      padding: 28px 26px 26px;
      background: radial-gradient(circle at top, rgba(148,163,184,0.18), transparent 60%),
                  linear-gradient(145deg, rgba(15,23,42,0.9), rgba(15,23,42,0.98));
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: radial-gradient(circle at top left, rgba(59,130,246,0.45), transparent 60%),
                  rgba(15,23,42,0.9);
      color: #e5e7eb;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.35);
    }

    .header {
      margin-bottom: 22px;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      font-size: 26px;
      font-weight: 650;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.5;
    }

    .hint-pill {
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px dashed rgba(148,163,184,0.6);
      background: rgba(15,23,42,0.9);
      white-space: nowrap;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .field-label {
      color: #cbd5f5;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .field-label span {
      color: #818cf8;
      margin-left: 4px;
      font-size: 11px;
    }

    .field-hint {
      color: var(--text-muted);
      font-size: 11px;
    }

    .input-wrap {
      position: relative;
    }

    .input {
      width: 100%;
      padding: 11px 12px;
      padding-left: 34px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.5);
      background: radial-gradient(circle at top, rgba(15,23,42,0.7), rgba(15,23,42,0.98));
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, transform 0.08s ease;
    }

    .input::placeholder {
      color: rgba(148,163,184,0.9);
    }

    .input-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.8;
      pointer-events: none;
    }

    .input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 1px rgba(96,165,250,0.8), 0 0 0 12px rgba(37,99,235,0.08);
      background: radial-gradient(circle at top, rgba(30,64,175,0.55), rgba(15,23,42,0.98));
      transform: translateY(-0.5px);
    }

    .input.error {
      border-color: #f97373;
      box-shadow: 0 0 0 1px rgba(248,113,113,0.65), 0 0 0 12px rgba(248,113,113,0.06);
    }

    .error-text {
      margin-top: 4px;
      font-size: 11px;
      color: var(--danger);
      min-height: 14px;
    }

    .actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
      gap: 10px;
      font-size: 11px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      accent-color: #4f46e5;
      width: 14px;
      height: 14px;
    }

    .link {
      color: #93c5fd;
      text-decoration: none;
      cursor: pointer;
    }

    .link:hover {
      text-decoration: underline;
    }

    .submit-btn {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 14px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      color: white;
      font-size: 14px;
      font-weight: 550;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(37,99,235,0.55);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
    }

    .submit-btn span.icon-arrow {
      font-size: 15px;
      transition: transform 0.12s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 55px rgba(37,99,235,0.7);
      filter: brightness(1.06);
    }

    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 12px 30px rgba(37,99,235,0.6);
      filter: brightness(0.98);
    }

    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .submit-btn.loading span.icon-arrow {
      transform: translateX(3px);
    }

    .divider {
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(148,163,184,0.5),
        transparent
      );
    }

    .oauth-row {
      display: flex;
      gap: 10px;
    }

    .oauth-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: radial-gradient(circle at top, rgba(15,23,42,0.9), rgba(15,23,42,0.98));
      color: var(--text-main);
      font-size: 12px;
      cursor: pointer;
      transition: background-color 0.12s ease, transform 0.08s ease, box-shadow 0.1s ease, border-color 0.12s ease;
    }

    .oauth-btn:hover {
      background: radial-gradient(circle at top, rgba(30,64,175,0.35), rgba(15,23,42,1));
      border-color: rgba(129,140,248,0.8);
      box-shadow: 0 12px 32px rgba(15,23,42,0.9);
      transform: translateY(-0.5px);
    }

    .oauth-icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: radial-gradient(circle at top, #f97316, #ea580c);
    }

    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }

    .footer a {
      color: #a5b4fc;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 22px 18px 20px;
        border-radius: 20px;
      }

      .title {
        font-size: 22px;
      }

      .hint-pill {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="glow" aria-hidden="true"></div>

    <div class="card">
      <div class="badge">
        <span class="badge-dot"></span>
        安全工作空间 · 登录
      </div>

      <header class="header">
        <div class="title-row">
          <div>
            <div class="title">欢迎回来</div>
            <p class="subtitle">使用账号登录以继续访问你的控制台。</p>
          </div>
          <div class="hint-pill">支持账号密码 & 单点登录</div>
        </div>
      </header>

      <form id="loginForm" novalidate>
        <div class="field">
          <div class="field-label-row">
            <label class="field-label" for="email">账号 / 邮箱<span>必填</span></label>
            <span class="field-hint">示例：user@example.com</span>
          </div>
          <div class="input-wrap">
            <span class="input-icon">＠</span>
            <input
              id="email"
              name="email"
              type="text"
              class="input"
              placeholder="输入你的登录账号或邮箱"
              autocomplete="username"
              required
            />
          </div>
          <div id="emailError" class="error-text"></div>
        </div>

        <div class="field">
          <div class="field-label-row">
            <label class="field-label" for="password">密码<span>必填</span></label>
            <a class="link" href="javascript:void(0)">忘记密码？</a>
          </div>
          <div class="input-wrap">
            <span class="input-icon">✦</span>
            <input
              id="password"
              name="password"
              type="password"
              class="input"
              placeholder="不少于 6 位，建议包含字母和数字"
              autocomplete="current-password"
              required
            />
          </div>
          <div id="passwordError" class="error-text"></div>
        </div>

        <div class="actions-row">
          <label class="remember">
            <input id="rememberMe" type="checkbox" checked />
            <span>下次自动登录</span>
          </label>
          <span style="color: var(--text-muted);">
            还没有账号？
            <a class="link" href="javascript:void(0)">立即注册</a>
          </span>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">
          <span>登录</span>
          <span class="icon-arrow">➜</span>
        </button>

        <div class="divider">
          <span class="divider-line"></span>
          <span>或使用其他方式继续</span>
          <span class="divider-line"></span>
        </div>

        <div class="oauth-row">
          <button type="button" class="oauth-btn">
            <span class="oauth-icon"></span>
            <span>企业单点登录</span>
          </button>
          <button type="button" class="oauth-btn">
            <span class="oauth-icon" style="background: radial-gradient(circle at top,#22c55e,#16a34a);"></span>
            <span>微信扫码登录</span>
          </button>
        </div>
      </form>

      <div class="footer">
        登录即表示你同意我们的
        <a href="javascript:void(0)">服务条款</a>
        和
        <a href="javascript:void(0)">隐私政策</a>。
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const submitBtn = document.getElementById("submitBtn");

    function validateEmail(value) {
      if (!value.trim()) return "请输入账号或邮箱";
      // 简单邮箱校验，可按需替换
      const emailLike = /.+@.+\..+/;
      if (value.includes("@") && !emailLike.test(value)) {
        return "邮箱格式好像不太对";
      }
      return "";
    }

    function validatePassword(value) {
      if (!value.trim()) return "请输入密码";
      if (value.length < 6) return "密码长度至少 6 位";
      return "";
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      emailError.textContent = "";
      passwordError.textContent = "";
      emailInput.classList.remove("error");
      passwordInput.classList.remove("error");

      const emailVal = emailInput.value;
      const passwordVal = passwordInput.value;

      const emailErr = validateEmail(emailVal);
      const passErr = validatePassword(passwordVal);

      let hasError = false;

      if (emailErr) {
        hasError = true;
        emailError.textContent = emailErr;
        emailInput.classList.add("error");
      }
      if (passErr) {
        hasError = true;
        passwordError.textContent = passErr;
        passwordInput.classList.add("error");
      }

      if (hasError) return;

      submitBtn.disabled = true;
      submitBtn.classList.add("loading");
      submitBtn.querySelector("span:first-child").textContent = "登录中…";

      // 这里替换为你的实际登录接口调用
      // 示例：fetch('/api/login', { method: 'POST', body: JSON.stringify({ ... }) })
      setTimeout(() => {
        // 模拟登录成功
        alert("登录成功（请在此处接入真实后端接口）");
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
        submitBtn.querySelector("span:first-child").textContent = "登录";
      }, 1000);
    });
  </script>
</body>
</html>
