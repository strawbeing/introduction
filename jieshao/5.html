<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>专业技能 - 杨佳蕊</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              warmGray: "#6B7280",
              mistBlue: "#9FB8D3",
              lightBeige: "#F7F3E9",
            },
          },
        },
      };
    </script>

    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background-color: #f7f3e9;
      }
    </style>
  </head>
  <body class="min-h-screen bg-lightBeige">
    <!-- 顶部导航/Logo -->
    <header class="w-full bg-white shadow-sm">
      <div
        class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4"
      >
        <div class="text-base font-semibold tracking-wide text-gray-800">
          杨佳蕊
        </div>
        <div class="hidden gap-4 text-sm text-warmGray sm:flex">
          <span>首页</span>
          <span>关于我</span>
          <span>经历</span>
          <span class="font-medium text-mistBlue">技能</span>
        </div>
      </div>
    </header>

    <!-- 主内容 -->
    <main class="px-4 py-10 sm:py-12">
      <section
        class="mx-auto flex w-full max-w-6xl flex-col gap-6 rounded-3xl bg-[#F7F3E9] px-4 pb-10 pt-6 sm:flex-row sm:gap-8 sm:px-8 sm:pb-12 sm:pt-8"
      >
        <!-- 左侧技能标签块 -->
        <div class="flex-1 space-y-4 sm:space-y-5">
          <!-- 标题 -->
          <div class="mb-2 text-center sm:text-left">
            <h1 class="text-2xl font-semibold text-gray-800 sm:text-3xl">
              专业技能
            </h1>
          </div>

          <!-- 产品设计 -->
          <div
            class="rounded-2xl bg-white px-5 py-4 shadow-[0_10px_26px_rgba(148,163,184,0.26)]"
          >
            <div class="mb-3 flex items-center gap-2">
              <div
                class="flex h-8 w-8 items-center justify-center rounded-full bg-[#E9F0FF]"
              >
                <div
                  class="h-4 w-4 rounded-xl border-2 border-mistBlue border-dashed"
                ></div>
              </div>
              <span class="text-sm font-semibold text-gray-800 sm:text-base">
                产品设计
              </span>
            </div>
            <div class="flex flex-wrap gap-2 text-xs text-warmGray sm:text-sm">
              <span
                class="rounded-full bg-[#F3F6FF] px-3 py-1 shadow-sm"
              >
                Axure原型设计
              </span>
              <span
                class="rounded-full bg-[#F3F6FF] px-3 py-1 shadow-sm"
              >
                Visio流程图
              </span>
              <span
                class="rounded-full bg-[#F3F6FF] px-3 py-1 shadow-sm"
              >
                PRD文档撰写
              </span>
              <span
                class="rounded-full bg-[#F3F6FF] px-3 py-1 shadow-sm"
              >
                需求分析与管理
              </span>
            </div>
          </div>

          <!-- 数据分析 -->
          <div
            class="rounded-2xl bg-white px-5 py-4 shadow-[0_10px_26px_rgba(148,163,184,0.22)]"
          >
            <div class="mb-3 flex items-center gap-2">
              <div
                class="flex h-8 w-8 items-center justify-center rounded-full bg-[#F4ECFF]"
              >
                <div
                  class="h-4 w-4 rounded-md border-2 border-mistBlue"
                ></div>
              </div>
              <span class="text-sm font-semibold text-gray-800 sm:text-base">
                数据分析
              </span>
            </div>
            <div class="flex flex-wrap gap-2 text-xs text-warmGray sm:text-sm">
              <span
                class="rounded-full bg-[#F7F2FF] px-3 py-1 shadow-sm"
              >
                Python数据处理
              </span>
              <span
                class="rounded-full bg-[#F7F2FF] px-3 py-1 shadow-sm"
              >
                统计建模
              </span>
              <span
                class="rounded-full bg-[#F7F2FF] px-3 py-1 shadow-sm"
              >
                机器学习
              </span>
              <span
                class="rounded-full bg-[#F7F2FF] px-3 py-1 shadow-sm"
              >
                深度学习实践
              </span>
            </div>
          </div>

          <!-- AI工程 -->
          <div
            class="rounded-2xl bg-white px-5 py-4 shadow-[0_10px_26px_rgba(148,163,184,0.22)]"
          >
            <div class="mb-3 flex items-center gap-2">
              <div
                class="flex h-8 w-8 items-center justify-center rounded-full bg-[#E7F8F6]"
              >
                <div
                  class="h-4 w-4 rounded-md border-2 border-mistBlue border-dashed"
                ></div>
              </div>
              <span class="text-sm font-semibold text-gray-800 sm:text-base">
                AI工程
              </span>
            </div>
            <div class="flex flex-wrap gap-2 text-xs text-warmGray sm:text-sm">
              <span
                class="rounded-full bg-[#ECFAF7] px-3 py-1 shadow-sm"
              >
                AIGC工具应用
              </span>
              <span
                class="rounded-full bg-[#ECFAF7] px-3 py-1 shadow-sm"
              >
                Cursor AI编程
              </span>
              <span
                class="rounded-full bg-[#ECFAF7] px-3 py-1 shadow-sm"
              >
                Coze智能体开发
              </span>
              <span
                class="rounded-full bg-[#ECFAF7] px-3 py-1 shadow-sm"
              >
                Prompt优化
              </span>
            </div>
          </div>
        </div>

        <!-- 右侧能力雷达图占位 -->
        <div
          class="flex flex-1 items-center justify-center rounded-3xl bg-white px-4 py-6 shadow-[0_12px_30px_rgba(148,163,184,0.26)] sm:px-6"
        >
          <div class="w-full max-w-md text-center">
            <h2 class="mb-4 text-sm font-semibold text-gray-800 sm:text-base">
              能力雷达图
            </h2>
            <!-- 简化实现为静态 SVG 雷达图 -->
            <div class="mx-auto max-w-xs">
              <svg
                viewBox="0 0 200 200"
                class="w-full text-mistBlue/70"
              >
                <!-- 网格多边形 -->
                <g fill="none" stroke="#E5E7EB" stroke-width="0.8">
                  <polygon points="100,20 168,60 168,140 100,180 32,140 32,60" />
                  <polygon points="100,40 152,70 152,130 100,160 48,130 48,70" />
                  <polygon points="100,60 136,80 136,120 100,140 64,120 64,80" />
                  <polygon points="100,80 120,90 120,110 100,120 80,110 80,90" />
                </g>
                <!-- 能力多边形 -->
                <polygon
                  fill="rgba(159,184,211,0.35)"
                  stroke="#9FB8D3"
                  stroke-width="1.5"
                  points="100,40 150,80 145,130 100,160 60,125 60,75"
                />
                <!-- 轴线 -->
                <g stroke="#E5E7EB" stroke-width="1">
                  <line x1="100" y1="100" x2="100" y2="20" />
                  <line x1="100" y1="100" x2="168" y2="60" />
                  <line x1="100" y1="100" x2="168" y2="140" />
                  <line x1="100" y1="100" x2="100" y2="180" />
                  <line x1="100" y1="100" x2="32" y2="140" />
                  <line x1="100" y1="100" x2="32" y2="60" />
                </g>
                <!-- 文字标签 -->
                <g
                  fill="#6B7280"
                  font-size="10"
                  text-anchor="middle"
                  dominant-baseline="central"
                >
                  <text x="100" y="12">数据</text>
                  <text x="176" y="56">AI赋</text>
                  <text x="176" y="144">实践</text>
                  <text x="100" y="190">管理</text>
                  <text x="24" y="144">协作</text>
                  <text x="24" y="56">理解</text>
                </g>
              </svg>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
