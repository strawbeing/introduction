<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人主页 - React + Tailwind</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              warmGray: "#6B7280",
              mistBlue: "#9FB8D3",
              lightBeige: "#F7F3E9",
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background-color: #f7f3e9;
        margin: 0;
      }

      #root {
        min-height: 100vh;
      }
    </style>

    <!-- React 18 & ReactDOM 18 UMD -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- React Router DOM v6 UMD -->
    <script crossorigin src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js"></script>

    <!-- Babel 用于在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { BrowserRouter, Routes, Route, NavLink } = ReactRouterDOM;

      const navItems = [
        { label: "首页", path: "/" },
        { label: "关于我", path: "/about" },
        { label: "工作经历", path: "/experience" },
        { label: "项目经验", path: "/projects" },
        { label: "专业技能", path: "/skills" },
        { label: "联系我", path: "/contact" },
      ];

      const Navbar = () => {
        return (
          <header className="fixed top-0 left-0 right-0 z-50 bg-white shadow-sm">
            <nav className="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
              <div className="text-lg font-semibold tracking-wide text-gray-800">
                杨佳蕊
              </div>

              <ul className="flex items-center gap-4">
                {navItems.map((item) => (
                  <li key={item.path}>
                    <NavLink
                      to={item.path}
                      end={item.path === "/"}
                      className={({ isActive }) =>
                        [
                          "px-3 py-1.5 text-sm rounded-lg transition-colors duration-300",
                          "text-[#6B7280] hover:bg-[#F3F4F6]",
                          isActive ? "bg-[#9FB8D3] text-white" : "",
                        ].join(" ")
                      }
                    >
                      {item.label}
                    </NavLink>
                  </li>
                ))}
              </ul>
            </nav>
          </header>
        );
      };

      const PlaceholderPage = ({ title }) => (
        <div className="mx-auto flex max-w-6xl flex-col gap-4 px-6 py-10">
          <h1 className="text-3xl font-semibold text-gray-800">{title}</h1>
          <p className="text-gray-500">
            这里是「{title}」页面的占位内容，后续可以在此处挂载具体页面组件。
          </p>
        </div>
      );

      const App = () => {
        return (
          <BrowserRouter>
            <div className="min-h-screen bg-[#F7F3E9]">
              <Navbar />
              <main className="pt-20">
                <Routes>
                  <Route path="/" element={<PlaceholderPage title="首页" />} />
                  <Route
                    path="/about"
                    element={<PlaceholderPage title="关于我" />}
                  />
                  <Route
                    path="/experience"
                    element={<PlaceholderPage title="工作经历" />}
                  />
                  <Route
                    path="/projects"
                    element={<PlaceholderPage title="项目经验" />}
                  />
                  <Route
                    path="/skills"
                    element={<PlaceholderPage title="专业技能" />}
                  />
                  <Route
                    path="/contact"
                    element={<PlaceholderPage title="联系我" />}
                  />
                </Routes>
              </main>
            </div>
          </BrowserRouter>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
