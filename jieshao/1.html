<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>杨佳蕊 · 首页</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              warmGray: "#6B7280",
              mistBlue: "#9FB8D3",
              mistBlueDark: "#8AA7C2",
              lightBeige: "#F7F3E9",
            },
          },
        },
      };
    </script>

    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background-color: #f7f3e9;
      }
    </style>
  </head>
  <body class="min-h-screen bg-lightBeige">
    <!-- 顶部导航占位（与截图左上角名字位置类似） -->
    <header class="w-full">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <div class="text-base font-semibold tracking-wide text-gray-800">
          杨佳蕊
        </div>
      </div>
    </header>

    <!-- 主内容 -->
    <main
      class="flex min-h-[calc(100vh-64px)] items-center justify-center px-4 pb-16 pt-4"
    >
      <div
        class="mx-auto flex w-full max-w-6xl flex-col items-center rounded-3xl bg-gradient-to-br from-white/95 via-white/90 to-[#F3F6FB] px-6 py-12 shadow-[0_18px_50px_rgba(148,163,184,0.35)]"
      >
        <!-- 顶部标题 -->
        <section class="flex flex-col items-center text-center">
          <h1
            class="text-4xl font-bold tracking-[0.2em] text-gray-800 sm:text-5xl"
          >
            杨佳蕊
          </h1>
          <p
            class="mt-4 text-sm text-warmGray sm:text-base"
          >
            AI产品经理 · 数据驱动决策 · AIGC实践者
          </p>
        </section>

        <!-- 中间标签 -->
        <section
          class="mt-8 flex flex-wrap items-center justify-center gap-4"
        >
          <span
            class="rounded-full bg-[#E9E7F5]/80 px-6 py-2 text-sm text-gray-700 shadow-sm"
          >
            产品思维
          </span>
          <span
            class="rounded-full bg-[#E7F0FB]/80 px-6 py-2 text-sm text-gray-700 shadow-sm"
          >
            数据洞察
          </span>
          <span
            class="rounded-full bg-[#E5F5F4]/80 px-6 py-2 text-sm text-gray-700 shadow-sm"
          >
            AI赋能
          </span>
        </section>

        <!-- 数据卡片 -->
        <section
          class="mt-10 grid w-full gap-6 px-2 sm:grid-cols-3 sm:px-0"
        >
          <!-- 卡片 1 -->
          <div
            class="flex flex-col items-center rounded-2xl bg-white/90 px-8 py-8 text-center shadow-[0_10px_30px_rgba(148,163,184,0.25)] transition-transform duration-300 hover:-translate-y-1 hover:shadow-[0_20px_45px_rgba(148,163,184,0.45)]"
          >
            <div class="text-sm text-warmGray">用户访问转化率提升</div>
            <div class="mt-4 text-3xl font-semibold text-gray-800">30%</div>
          </div>

          <!-- 卡片 2 -->
          <div
            class="flex flex-col items-center rounded-2xl bg-white/90 px-8 py-8 text-center shadow-[0_10px_30px_rgba(148,163,184,0.25)] transition-transform duration-300 hover:-translate-y-1 hover:shadow-[0_20px_45px_rgba(148,163,184,0.45)]"
          >
            <div class="text-sm text-warmGray">数据样本</div>
            <div class="mt-4 text-3xl font-semibold text-gray-800">10万+</div>
          </div>

          <!-- 卡片 3 -->
          <div
            class="flex flex-col items-center rounded-2xl bg-white/90 px-8 py-8 text-center shadow-[0_10px_30px_rgba(148,163,184,0.25)] transition-transform duration-300 hover:-translate-y-1 hover:shadow-[0_20px_45px_rgba(148,163,184,0.45)]"
          >
            <div class="text-sm text-warmGray">用户调研问卷</div>
            <div class="mt-4 text-3xl font-semibold text-gray-800">1000+</div>
          </div>
        </section>

        <!-- 底部按钮 -->
        <section class="mt-10 flex w-full justify-center px-2">
          <button
            class="w-full max-w-xs rounded-[16px] bg-mistBlue px-8 py-3 text-sm font-medium text-white shadow-md transition-transform transition-colors duration-300 hover:scale-[1.02] hover:bg-mistBlueDark focus:outline-none focus:ring-2 focus:ring-mistBlue/70 focus:ring-offset-2 focus:ring-offset-transparent"
          >
            查看作品集
          </button>
        </section>
      </div>
    </main>
  </body>
</html>
